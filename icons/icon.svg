<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">PrimordInventory app icon</title>
  <desc id="desc">Cosmetics-style purple and pink perfume bottle icon for the inventory PWA.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f854a7"/>
      <stop offset="0.52" stop-color="#c85cf6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="180" y1="150" x2="330" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe4f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#5b1a7a" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="114" cy="132" r="18" fill="#ffffff" opacity="0.9"/>
  <circle cx="386" cy="166" r="13" fill="#ffffff" opacity="0.8"/>
  <circle cx="374" cy="352" r="22" fill="#ffe6f6" opacity="0.75"/>
  <circle cx="134" cy="376" r="10" fill="#ffe6f6" opacity="0.9"/>
  <g filter="url(#shadow)">
    <rect x="230" y="106" width="52" height="36" rx="8" fill="url(#shine)"/>
    <rect x="208" y="132" width="96" height="58" rx="16" fill="url(#shine)"/>
    <rect x="170" y="180" width="172" height="210" rx="36" fill="url(#shine)"/>
    <rect x="198" y="250" width="116" height="66" rx="18" fill="#8b5cf6"/>
    <path d="M216 282h80" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.92"/>
    <path d="M216 300h54" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  </g>
  <path d="M96 242c26-58 66-96 120-114" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" opacity="0.18"/>
